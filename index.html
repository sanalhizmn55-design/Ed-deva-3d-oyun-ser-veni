<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kaçış Oyunu</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { background: #000; border: 3px solid #555; cursor: crosshair; }
        .info { position: absolute; top: 10px; font-size: 20px; }
    </style>
</head>
<body>
    <div class="info">Skor: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreDist = document.getElementById("score");

        canvas.width = 500;
        canvas.height = 500;

        let score = 0;
        let gameActive = true;
        let enemies = [];
        let player = { x: 250, y: 250, size: 20, color: "#00ff00" };

        // Mouse takibi
        canvas.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            player.x = e.clientX - rect.left - player.size / 2;
            player.y = e.clientY - rect.top - player.size / 2;
        });

        function spawnEnemy() {
            if (!gameActive) return;
            let size = 15 + Math.random() * 20;
            let x, y;
            
            // Düşmanları kenarlardan başlat
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 : canvas.width;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 : canvas.height;
            }

            enemies.push({
                x: x,
                y: y,
                size: size,
                speedX: (Math.random() - 0.5) * 4,
                speedY: (Math.random() - 0.5) * 4,
                color: "#ff4444"
            });
            
            // Zorluğu artır (her 2 saniyede yeni düşman)
            setTimeout(spawnEnemy, 2000 / (1 + score / 100));
        }

        function draw() {
            if (!gameActive) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Oyuncuyu çiz
            ctx.fillStyle = player.color;
            ctx.fillRect(player.x, player.y, player.size, player.size);

            // Düşmanları güncelle ve çiz
            enemies.forEach((enemy, index) => {
                enemy.x += enemy.speedX;
                enemy.y += enemy.speedY;

                // Ekran dışına çıkanları geri döndür
                if (enemy.x < 0 || enemy.x > canvas.width) enemy.speedX *= -1;
                if (enemy.y < 0 || enemy.y > canvas.height) enemy.speedY *= -1;

                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.size, enemy.size);

                // Çarpışma kontrolü
                if (player.x < enemy.x + enemy.size &&
                    player.x + player.size > enemy.x &&
                    player.y < enemy.y + enemy.size &&
                    player.y + player.size > enemy.y) {
                    gameActive = false;
                    alert("YAKALANDIN! Skorun: " + Math.floor(score));
                    location.reload();
                }
            });

            score += 0.1;
            scoreDist.innerText = Math.floor(score);
            requestAnimationFrame(draw);
        }

        spawnEnemy();
        draw();
    </script>
</body>
</html>
