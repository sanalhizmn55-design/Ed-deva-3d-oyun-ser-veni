<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Sonsuz Yol Yarışı</title>
    <style>
        body { margin: 0; background: #222; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: Arial; color: white; }
        canvas { background: #333; border: 5px solid #555; }
        .ui { position: absolute; top: 20px; text-align: center; }
    </style>
</head>
<body>
    <div class="ui">
        <h1>HIZLI SÜRÜŞ</h1>
        <p>Skor: <span id="score">0</span></p>
    </div>
    <canvas id="raceCanvas"></canvas>

    <script>
        const canvas = document.getElementById("raceCanvas");
        const ctx = canvas.getContext("2d");
        const scoreEl = document.getElementById("score");

        canvas.width = 400;
        canvas.height = 600;

        let score = 0;
        let speed = 5;
        let gameActive = true;

        let car = { x: 175, y: 500, w: 50, h: 80, color: "#e74c3c" };
        let enemies = [];

        // Kontroller
        document.addEventListener("keydown", (e) => {
            if (e.key === "ArrowLeft" && car.x > 0) car.x -= 25;
            if (e.key === "ArrowRight" && car.x < canvas.width - car.w) car.x += 25;
        });

        // Dokunmatik/Mouse kontrolleri
        canvas.addEventListener("mousemove", (e) => {
            let rect = canvas.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            car.x = mouseX - car.w / 2;
            if (car.x < 0) car.x = 0;
            if (car.x > canvas.width - car.w) car.x = canvas.width - car.w;
        });

        function spawnEnemy() {
            let xPos = Math.random() * (canvas.width - 50);
            enemies.push({ x: xPos, y: -100, w: 50, h: 80, color: "#3498db" });
        }

        setInterval(() => { if(gameActive) spawnEnemy(); }, 1200);

        function draw() {
            if (!gameActive) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Yol çizgileri
            ctx.strokeStyle = "white";
            ctx.setLineDash([20, 20]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();

            // Kendi Arabamız
            ctx.fillStyle = car.color;
            ctx.fillRect(car.x, car.y, car.w, car.h);
            // Arabanın farları
            ctx.fillStyle = "yellow";
            ctx.fillRect(car.x + 5, car.y, 10, 5);
            ctx.fillRect(car.x + car.w - 15, car.y, 10, 5);

            // Düşman Arabalar
            enemies.forEach((enemy, index) => {
                enemy.y += speed;
                ctx.fillStyle = enemy.color;
                ctx.fillRect(enemy.x, enemy.y, enemy.w, enemy.h);

                // Çarpışma Testi
                if (car.x < enemy.x + enemy.w &&
                    car.x + car.w > enemy.x &&
                    car.y < enemy.y + enemy.h &&
                    car.y + car.h > enemy.y) {
                    gameActive = false;
                    alert("KAZA YAPTIN! Skorun: " + score);
                    location.reload();
                }

                // Geçilen arabalar
                if (enemy.y > canvas.height) {
                    enemies.splice(index, 1);
                    score += 10;
                    scoreEl.innerText = score;
                    if(score % 100 === 0) speed += 0.5; // Gittikçe hızlanır
                }
            });

            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
