<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Luxury Drive Mobile</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="ui">SKOR: <span id="scoreVal">0</span></div>

    <div id="controls">
        <div class="joystick-zone">
            <button class="btn" id="btnLeft">←</button>
            <button class="btn" id="btnRight">→</button>
        </div>
        <div class="pedal-zone">
            <button class="btn btn-gas" id="btnGas">GAZ</button>
            <button class="btn btn-brake" id="btnBrake">FREN</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
