<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>101 Okey ENES DEVA Clean</title>
    <style>
        :root { --green: #144d29; --wood: #4d2c19; --tile: #fdf5e6; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; background: #000; font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; height: 100vh; width: 100vw; 
        }

        /* Ana Konteyner - Ekranın Dışına Taşmayı Önler */
        #main-container {
            width: 100%; height: 100%; background: var(--green);
            display: flex; flex-direction: column; position: relative;
        }

        /* Üst Panel (Oyuncular) */
        .header { 
            height: 45px; display: flex; justify-content: space-around; 
            align-items: center; background: rgba(0,0,0,0.4); padding: 0 10px;
        }
        .player { background: #333; color: #ccc; padding: 4px 20px; border-radius: 6px; font-size: 12px; border: 1px solid #555; }
        .active { border-color: #4caf50; color: #fff; box-shadow: 0 0 8px #4caf50; }

        /* Oyun Alanı */
        .game-area { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Izgara (Grid) */
        .board-grid {
            display: grid; grid-template-columns: repeat(18, 1fr); grid-template-rows: repeat(6, 1fr);
            gap: 2px; width: 90%; height: 60%; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.1); border-radius: 8px; padding: 4px;
        }
        .cell { border: 1px solid rgba(255,255,255,0.03); border-radius: 2px; }

        /* Merkez Objeler (Deste & Okey) */
        .center-ui { position: absolute; display: flex; gap: 25px; align-items: center; z-index: 5; }
        .box { background: #fff; color: #000; border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .okey-box { width: 55px; height: 75px; border: 2px solid #f1c40f; font-size: 11px; }
        .deck-box { width: 65px; height: 85px; cursor: pointer; border-bottom: 4px solid #ddd; font-size: 13px; }

        /* Istaka Alanı */
        .rack-section { 
            height: 180px; background: linear-gradient(to bottom, #5d4037, #2d1b12); 
            border-top: 6px solid #261709; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .row { display: flex; gap: 3px; margin: 2px 0; height: 65px; }

        /* Taşlar */
        .tile { 
            width: 38px; height: 62px; background: var(--tile); color: #000; border-radius: 4px;
            display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px;
            box-shadow: 1px 2px 4px rgba(0,0,0,0.4); border-bottom: 3px solid #ccc;
        }
        .red { color: #d32f2f; } .blue { color: #1976d2; } .black { color: #212121; } .yellow { color: #f57f17; }

        /* Butonlar - Taşma Yapmayacak Boyutta */
        .controls { position: absolute; top: -45px; display: flex; gap: 10px; }
        .btn { 
            width: 52px; height: 52px; border-radius: 50%; border: 2px solid #fff;
            color: #fff; font-size: 10px; font-weight: bold; display: flex; 
            align-items: center; justify-content: center; cursor: pointer; text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        /* Bildirim */
        #toast { 
            position: fixed; top: 20%; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.9); color: #f1c40f; padding: 10px 20px; 
            border-radius: 20px; font-weight: bold; z-index: 100; opacity: 0; transition: 0.3s;
        }
    </style>
</head>
<body>

<div id="toast">101 Okey</div>

<div id="main-container">
    <div class="header">
        <div class="player" id="p1">Seda</div>
        <div class="player" id="p2">İpek</div>
        <div class="player" id="p3">Rümeysa</div>
    </div>

    <div class="game-area">
        <div class="board-grid" id="grid"></div>
        <div class="center-ui">
            <div class="box okey-box">OKEY<br><span class="red" style="font-size:20px">5</span></div>
            <div class="box deck-box" onclick="draw()">DESTE<br>77</div>
            <div style="width: 65px; height: 85px; border: 2px dashed rgba(255,255,255,0.2); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 10px;">ATILAN</div>
        </div>
    </div>

    <div class="rack-section">
        <div class="controls">
            <div class="btn" style="background:#2e7d32" onclick="sort(1)">SERİ<br>DİZ</div>
            <div class="btn" style="background:#1565c0" onclick="sort(2)">ÇİFT<br>DİZ</div>
            <div class="btn" style="background:#c62828" onclick="showErr()">EL<br>AÇ</div>
        </div>
        <div class="row" id="r1"></div>
        <div class="row" id="r2"></div>
    </div>
</div>

<script>
    let myTiles = [];
    const colors = ['red', 'blue', 'black', 'yellow'];

    // Izgarayı Oluştur
    const grid = document.getElementById('grid');
    for(let i=0; i<108; i++) grid.innerHTML += '<div class="cell"></div>';

    function showErr() {
        const t = document.getElementById('toast');
        t.innerText = "Yeterli sayıya ulaşamadınız! (Min: 101)";
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2000);
    }

    function init() {
        for(let i=0; i<21; i++) {
            myTiles.push({ 
                c: colors[Math.floor(Math.random()*4)], 
                n: Math.floor(Math.random()*13)+1 
            });
        }
        render();
    }

    function render() {
        const r1 = document.getElementById('r1');
        const r2 = document.getElementById('r2');
        r1.innerHTML = ''; r2.innerHTML = '';
        
        myTiles.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = `tile ${t.c}`;
            d.innerText = t.n;
            // Sürükle bırak mantığı için temel yapı
            d.onclick = () => { /* Yer değiştirme buraya gelecek */ };
            if(i < 11) r1.appendChild(d); else r2.appendChild(d);
        });
    }

    function sort(type) {
        if(type === 1) myTiles.sort((a,b) => a.c === b.c ? a.n - b.n : a.c.localeCompare(b.c));
        else myTiles.sort((a,b) => a.n - b.n);
        render();
    }

    function draw() {
        if(myTiles.length < 22) {
            myTiles.push({c: 'blue', n: 7});
            render();
        }
    }

    init();
</script>
</body>
</html>
