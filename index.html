<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>101 Okey Elite Offline</title>
    <style>
        :root { --bg: #1a4a6e; --grid: rgba(255,255,255,0.1); --tile: #fdfdfd; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        #game-screen { width: 100%; height: 100%; background: radial-gradient(circle, #235d8a, #0f2a40); display: flex; flex-direction: column; position: relative; }
        .top-bar { height: 40px; display: flex; justify-content: center; align-items: center; padding-top: 5px; }
        .user-card { background: rgba(0,0,0,0.6); padding: 2px 15px; border-radius: 5px; display: flex; align-items: center; gap: 8px; border: 1px solid #555; }
        .table-area { flex: 1; margin: 10px 40px; border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; background: rgba(0,0,0,0.2); position: relative; display: grid; grid-template-columns: repeat(24, 1fr); grid-template-rows: repeat(10, 1fr); gap: 1px; padding: 2px; }
        .grid-cell { border: 0.5px solid rgba(255,255,255,0.05); }
        .side-player { position: absolute; top: 50%; transform: translateY(-50%); width: 35px; background: rgba(0,0,0,0.7); border: 1px solid #777; padding: 10px 0; text-align: center; border-radius: 5px; }
        .left-p { left: -35px; } .right-p { right: -35px; }
        .indicators { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); display: flex; gap: 30px; z-index: 10; }
        .info-box { width: 55px; height: 75px; background: white; border-radius: 4px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; font-weight: bold; box-shadow: 3px 3px 0 rgba(0,0,0,0.5); font-size: 11px; }
        .rack-container { height: 160px; background: #5d4037; border-top: 5px solid #3e2723; display: flex; flex-direction: column; align-items: center; padding-top: 35px; position: relative; }
        .rack-row { display: flex; gap: 3px; height: 60px; }
        .tile { width: 36px; height: 58px; background: var(--tile); color: #000; border-radius: 3px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; border-bottom: 3px solid #bbb; box-shadow: 1px 1px 3px #000; cursor: pointer; }
        .t-red { color: #d32f2f; } .t-blue { color: #1976d2; } .t-black { color: #000; } .t-yellow { color: #f9a825; }
        .btns-row { position: absolute; top: -35px; display: flex; gap: 10px; }
        .orange-btn { width: 48px; height: 48px; background: #f39c12; border: 2px solid #fff; border-radius: 50%; color: #fff; font-size: 9px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.4); cursor: pointer; }
        #toast { position: fixed; top: 25%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: #f1c40f; padding: 10px 25px; border-radius: 20px; font-weight: bold; opacity: 0; transition: 0.3s; z-index: 1000; border: 1px solid #f1c40f; }
    </style>
</head>
<body>

<div id="toast">Yeterli Sayı Yok!</div>

<div id="game-screen">
    <div class="top-bar">
        <div class="user-card">
            <span style="font-size:12px; font-weight:bold">Hidayet Can</span>
            <div style="width:40px; height:4px; background:#4caf50; border-radius:2px"></div>
        </div>
    </div>

    <div class="table-area" id="grid-bg">
        <div class="side-player left-p"><span style="writing-mode: vertical-rl; font-size: 10px;">SABRİYE</span></div>
        <div class="side-player right-p"><span style="writing-mode: vertical-rl; font-size: 10px;">RÜMEYSA</span></div>

        <div class="indicators">
            <div class="info-box">OKEY<br><span class="t-red" style="font-size:18px">6</span></div>
            <div class="info-box" style="width:65px; height:85px;">DESTE<br>77</div>
            <div style="width:60px; height:80px; border:2px dashed #fff; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:10px;">AT</div>
        </div>
    </div>

    <div class="rack-container">
        <div class="btns-row">
            <div class="orange-btn" onclick="sort(1)">SERİ<br>AÇ</div>
            <div class="orange-btn" onclick="sort(2)">ÇİFT<br>AÇ</div>
            <div class="orange-btn" style="background:#d35400" onclick="showMsg()">EL<br>AÇ</div>
        </div>
        <div class="rack-row" id="row1"></div>
        <div class="rack-row" id="row2"></div>
    </div>
</div>

<script>
    // --- OFFLINE ÇALIŞMA SİSTEMİ (Service Worker) ---
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const blob = new Blob([`
                const CACHE_NAME = 'okey-v1';
                const assets = [location.href];
                self.addEventListener('install', e => e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(assets))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `], { type: 'text/javascript' });
            const workerUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(workerUrl);
        });
    }

    let myTiles = [];
    const colors = ['t-red', 't-blue', 't-black', 't-yellow'];

    function showMsg() {
        const t = document.getElementById('toast');
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2000);
    }

    function init() {
        const grid = document.getElementById('grid-bg');
        for(let i=0; i<240; i++) grid.appendChild(document.createElement('div')).className = 'grid-cell';
        
        for(let i=0; i<22; i++) {
            myTiles.push({ c: colors[Math.floor(Math.random()*4)], n: Math.floor(Math.random()*13)+1 });
        }
        render();
    }

    function render() {
        const r1 = document.getElementById('row1');
        const r2 = document.getElementById('row2');
        r1.innerHTML = ''; r2.innerHTML = '';
        myTiles.forEach((t, i) => {
            const d = document.createElement('div');
            d.className = `tile ${t.c}`;
            d.innerText = t.n;
            if(i < 11) r1.appendChild(d); else r2.appendChild(d);
        });
    }

    function sort(m) {
        if(m===1) myTiles.sort((a,b) => a.c === b.c ? a.n - b.n : a.c.localeCompare(b.c));
        else myTiles.sort((a,b) => a.n - b.n);
        render();
    }

    init();
    document.addEventListener('click', () => document.documentElement.requestFullscreen?.(), {once: true});
</script>
</body>
</html>
